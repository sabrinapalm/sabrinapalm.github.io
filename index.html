<!DOCTYPE html>
<html class="no-js" lang="en">

<head>
	<meta charset="utf-8">
	<title>Sabrina Palm | Frontend Developer </title>
	<meta name="description" content="">
	<meta name="author" content="">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
	<link href="https://fonts.googleapis.com/css?family=Lato" rel="stylesheet">
	<link rel="icon" type="image/png" href="images/favicon.png">
	<style>
		body {
			background: #141414;
		}

		.page {
			height: 85vh;
			position: relative;
		}

		.page a {
			margin: 0;
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
		}

		.link {
			color: #FFF;
			font-size: 16px;
			text-decoration: none;
			text-transform: uppercase;
			font-family: 'Lato';
			letter-spacing: 2px;
			font-size: 20px;
		}

		.link {
			position: relative;
			z-index: 1;
			display: inline-flex;

			padding-left: 10px;
			padding-bottom: 5px;
			padding-right: 10px;
		}

		.link::before {
			content: "";
			width: 100%;
			height: 100%;
			background-image: linear-gradient(to top, #08fdd8 25%, rgba(0, 0, 0, 0) 40%);

			position: absolute;
			left: 0;
			bottom: 2px;
			z-index: -1;

			will-change: width;
			transform: rotate(-2deg);
			transform-origin: left bottom
		}

		.link:hover::before {
			width: 0;
		}

		.link::before {
			transition: width .1s ease-out;
		}

		.link:hover::before {
			transition-duration: .15s;
		}
	</style>
</head>

<body>
	<div class="page">
		<a href="https://sabrinapalm.com" class="link">sabrinapalm.com</a>
	</div>
</body>

</html>
